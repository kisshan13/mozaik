name: Release and publish to npm

# pull_request_target: runs in base-repo context so secrets (e.g. NPM_TOKEN) are available
# when merging PRs from forks. We only ever checkout `main`, not untrusted PR head refs.
on:
    pull_request_target:
        branches:
            - main
        types:
            - closed

permissions:
    contents: write
    pull-requests: read

jobs:
    release:
        name: Publish to npm, then AI release notes, tag, and GitHub release
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest

        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  ref: main
                  fetch-depth: 0

            - name: Configure Git
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"

            - name: Get latest tag
              id: latest_tag
              run: |
                  TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Validate release label
              run: |
                  LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

                  echo "PR labels: $LABELS"

                  COUNT=0

                  if echo "$LABELS" | grep -q "release:major"; then
                    COUNT=$((COUNT + 1))
                  fi

                  if echo "$LABELS" | grep -q "release:minor"; then
                    COUNT=$((COUNT + 1))
                  fi

                  if echo "$LABELS" | grep -q "release:patch"; then
                    COUNT=$((COUNT + 1))
                  fi

                  if [ "$COUNT" -eq 0 ]; then
                    echo "Missing release label."
                    echo "Add one of: release:patch, release:minor, release:major"
                    exit 1
                  fi

                  if [ "$COUNT" -gt 1 ]; then
                    echo "Multiple release labels found."
                    echo "Use only one of: release:patch, release:minor, release:major"
                    exit 1
                  fi

            - name: Calculate next version from PR label
              id: version
              run: |
                  LATEST="${{ steps.latest_tag.outputs.tag }}"
                  VERSION="${LATEST#v}"

                  IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

                  LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

                  if echo "$LABELS" | grep -q "release:major"; then
                    MAJOR=$((MAJOR + 1))
                    MINOR=0
                    PATCH=0
                  elif echo "$LABELS" | grep -q "release:minor"; then
                    MINOR=$((MINOR + 1))
                    PATCH=0
                  elif echo "$LABELS" | grep -q "release:patch"; then
                    PATCH=$((PATCH + 1))
                  fi

                  NEXT="v$MAJOR.$MINOR.$PATCH"

                  echo "Latest version: $LATEST"
                  echo "Next version: $NEXT"

                  echo "next=$NEXT" >> "$GITHUB_OUTPUT"

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  registry-url: "https://registry.npmjs.org"
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Install dependencies
              run: npm ci

            - name: Collect release context from merged PR only
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  HEAD_SHA: ${{ github.event.pull_request.head.sha }}
              run: |
                  echo "PR number: $PR_NUMBER"
                  echo "Base SHA: $BASE_SHA"
                  echo "Head SHA: $HEAD_SHA"

                  git fetch origin "pull/${PR_NUMBER}/head:pr-${PR_NUMBER}"

                  MERGE_BASE=$(git merge-base "$BASE_SHA" "pr-${PR_NUMBER}")

                  echo "Merge base: $MERGE_BASE"

                  git log "$MERGE_BASE..pr-${PR_NUMBER}" --pretty=format:"- %s (%h)" > commits.txt || true

                  git diff --stat "$MERGE_BASE..pr-${PR_NUMBER}" \
                    -- \
                    ':!package-lock.json' \
                    ':!yarn.lock' \
                    ':!pnpm-lock.yaml' \
                    ':!dist/**' \
                    ':!build/**' \
                    ':!coverage/**' \
                    ':!*.snap' \
                    > diff_stat.txt || true

                  git diff --no-ext-diff --unified=3 "$MERGE_BASE..pr-${PR_NUMBER}" \
                    -- \
                    ':!package-lock.json' \
                    ':!yarn.lock' \
                    ':!pnpm-lock.yaml' \
                    ':!dist/**' \
                    ':!build/**' \
                    ':!coverage/**' \
                    ':!*.snap' \
                    > diff.txt || true

                  echo "Commits from this PR only:"
                  cat commits.txt || true

                  echo ""
                  echo "Diff summary from this PR only:"
                  cat diff_stat.txt || true

                  echo ""
                  echo "Diff collected from this PR only."

            - name: Limit diff size
              run: |
                  MAX_BYTES=60000

                  if [ -f diff.txt ]; then
                    SIZE=$(wc -c < diff.txt)

                    echo "Original diff size: $SIZE bytes"

                    if [ "$SIZE" -gt "$MAX_BYTES" ]; then
                      echo "Diff is too large. Truncating to $MAX_BYTES bytes."

                      head -c "$MAX_BYTES" diff.txt > diff_limited.txt

                      echo "" >> diff_limited.txt
                      echo "" >> diff_limited.txt
                      echo "[Diff truncated because it was too large.]" >> diff_limited.txt

                      mv diff_limited.txt diff.txt
                    fi
                  fi

            - name: Resolve release version and sync package.json
              id: release_version
              run: |
                  set -euo pipefail
                  COMPUTED="${{ steps.version.outputs.next }}"
                  COMPUTED_NUM="${COMPUTED#v}"
                  PKG=$(node -p "require('./package.json').version")

                  echo "Computed from tag + label: $COMPUTED_NUM"
                  echo "package.json on main: $PKG"

                  # If package.json was bumped in the merged PR, it may already match (or exceed) the computed bump.
                  if [ "$(printf '%s\n' "$PKG" "$COMPUTED_NUM" | sort -V | tail -1)" = "$PKG" ] && [ "$PKG" != "$COMPUTED_NUM" ]; then
                    NEXT_NUM="$PKG"
                    echo "Using package.json version $NEXT_NUM (newer than computed $COMPUTED_NUM)."
                  else
                    NEXT_NUM="$COMPUTED_NUM"
                  fi

                  NEXT="v$NEXT_NUM"
                  echo "next=$NEXT" >> "$GITHUB_OUTPUT"
                  echo "Release version: $NEXT"

                  if [ "$PKG" != "$NEXT_NUM" ]; then
                    echo "Applying npm version $NEXT_NUM (was $PKG)."
                    npm version "$NEXT_NUM" --no-git-tag-version
                  else
                    echo "package.json already at $NEXT_NUM; skipping npm version."
                  fi

            - name: Build package
              run: npm run build

            - name: Publish to npm
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  if [ -z "${NODE_AUTH_TOKEN}" ]; then
                    echo "NPM_TOKEN is not set. Add repository secret NPM_TOKEN (npm automation token) under Settings → Secrets and variables → Actions."
                    exit 1
                  fi
                  if [ -f .npmrc ]; then
                    sed -i '/^\/\/registry\.npmjs\.org\/:_authToken=/d' .npmrc
                  fi
                  npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"

                  PKG_NAME=$(node -p "require('./package.json').name")
                  echo "npm whoami (account used for publish):"
                  npm whoami
                  echo "Package name: $PKG_NAME"
                  echo "Published versions (read-only check):"
                  npm view "$PKG_NAME" versions --json || true

                  if ! npm publish --access public --ignore-scripts; then
                    echo ""
                    echo "Publish failed. npm often returns HTTP 404 for PUT when the token is valid but is NOT allowed to publish this scope/package."
                    echo "Fix on npmjs.com (not in this repo):"
                    echo "  - Open npm → Access → Organizations → @mozaik-ai → Members: the account from 'npm whoami' must have publish rights."
                    echo "  - Or replace NPM_TOKEN with a token from an owner/maintainer of @mozaik-ai/core."
                    echo "  - Granular tokens: grant Read and Write for package '@mozaik-ai/core' (and authorize SSO for the org if required)."
                    exit 1
                  fi

            - name: Commit version bump and push to main
              run: |
                  VERSION="${{ steps.release_version.outputs.next }}"

                  git add package.json package-lock.json
                  if git diff --staged --quiet; then
                    echo "No changes to commit (version files already match $VERSION on main)."
                  else
                    git commit -m "chore: release $VERSION"
                    git push origin main
                  fi

            - name: Generate release notes with AI
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  VERSION: ${{ steps.release_version.outputs.next }}
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  PR_BODY: ${{ github.event.pull_request.body }}
              run: |
                  COMMITS=$(cat commits.txt || true)
                  DIFF_STAT=$(cat diff_stat.txt || true)
                  DIFF=$(cat diff.txt || true)

                  RELEASE_DATE=$(date -u +"%Y-%m-%d")
                  RELEASE_TIME=$(date -u +"%H:%M UTC")

                  PROMPT=$(cat <<EOF
                  Write GitHub release notes for version $VERSION.

                  The first line MUST use this exact version header:

                  **Version $VERSION — $RELEASE_DATE, $RELEASE_TIME**

                  Then output the changelog using EXACTLY this Markdown structure and spacing:

                  ### Changelog
                  ___

                  **New**

                  - Added **[Feature Name]** - [short description]

                  **Changes**

                  - [Describe changed behavior, export, API, config, default, or meaningful refactor]

                  **Bug Fixes**

                  - Fixed an issue where [problem description]

                  ----

                  Replace bracketed placeholders with real content derived from the materials below.

                  Section omission is mandatory:
                  - Do not output **New** unless there is at least one real new feature.
                  - Do not output **Changes** unless there is at least one meaningful change.
                  - Do not output **Bug Fixes** unless there is at least one real bug fix.
                  - Never print placeholder bullets.
                  - Never print "none".
                  - Never include empty sections.

                  Context:

                  Pull request:
                  #$PR_NUMBER - $PR_TITLE

                  Pull request description:
                  $PR_BODY

                  Commit messages from this PR only:
                  $COMMITS

                  Diff summary from this PR only:
                  $DIFF_STAT

                  Code diff from this PR only:
                  $DIFF

                  Instructions:
                  - Base the release notes mainly on the actual code diff.
                  - Use the PR title, PR description, and commit messages as supporting context only.
                  - Focus on user-facing or release-relevant changes.
                  - Classify by the intent of the change, not by file type.
                  - If the purpose is to correct wrong behavior, classify it only as **Bug Fixes**.
                  - If the purpose is to intentionally alter behavior, classify it as **Changes**.
                  - If the purpose is to add a new capability, classify it as **New**.
                  - Ignore generated files, lock files, formatting-only changes, and test-only changes unless they affect users.
                  - Keep wording concise and factual.
                  - Do not include changes from previous releases.
                  EOF
                  )

                  jq -n \
                    --arg prompt "$PROMPT" \
                    '{
                      model: "gpt-4o-mini",
                      input: $prompt
                    }' > request.json

                  HTTP_STATUS=$(curl -s -w "%{http_code}" -o response.json https://api.openai.com/v1/responses \
                    -H "Authorization: Bearer $OPENAI_API_KEY" \
                    -H "Content-Type: application/json" \
                    -d @request.json)

                  echo "OpenAI HTTP status: $HTTP_STATUS"

                  if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
                    echo "OpenAI API request failed:"
                    cat response.json
                    exit 1
                  fi

                  jq -r '
                    [
                      .output[]
                      | select(.type == "message")
                      | .content[]
                      | select(.type == "output_text")
                      | .text
                    ]
                    | join("\n")
                  ' response.json > release_notes.md

                  if [ ! -s release_notes.md ] || [ "$(cat release_notes.md)" = "null" ]; then
                    echo "No release notes were generated."
                    echo "OpenAI response was:"
                    cat response.json
                    exit 1
                  fi

                  echo "Generated release notes:"
                  cat release_notes.md

            - name: Create and push version tag
              run: |
                  VERSION="${{ steps.release_version.outputs.next }}"

                  git tag "$VERSION"
                  git push origin "$VERSION"

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${{ steps.release_version.outputs.next }}"

                  gh release create "$VERSION" \
                    --target main \
                    --title "$VERSION" \
                    --notes-file release_notes.md
